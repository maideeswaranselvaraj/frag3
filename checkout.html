<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - Elora</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="navbar">
    <div class="brand-wrap">
      <img class="brand-logo" src="images/elora-logo.svg" alt="Elora logo">
      <h1>Elora</h1>
    </div>
    <nav>
      <a href="index.html">Home</a>
      <a href="products.html">Products</a>
      <a href="checkout.html" class="active">Checkout</a>
    </nav>
  </header>

  <main class="container">
    <h2>Checkout</h2>

    <section class="card">
      <form id="checkoutForm" class="form-grid">
        <label for="customerName">Customer Name</label>
        <input type="text" id="customerName" required>

        <label for="email">Email</label>
        <input type="email" id="email" required>

        <label for="phone">Phone</label>
        <input type="tel" id="phone" required>

        <label for="address">Address</label>
        <textarea id="address" rows="3" required></textarea>

        <label for="productSelect">Select Product</label>
        <select id="productSelect" required>
          <option value="">-- Select a perfume --</option>
        </select>

        <label for="quantity">Quantity</label>
        <input type="number" id="quantity" min="1" value="1" required>

        <label for="total">Total Amount</label>
        <input type="text" id="total" readonly>

        <div class="form-actions">
          <button type="submit" class="btn">Place Order</button>
        </div>
      </form>
      <p id="checkoutMessage" class="message"></p>
    </section>
  </main>

  <footer class="footer">
    <div class="footer-contact">
      <p>&copy; 2026 Elora. All rights reserved.</p>
      <p><strong>Address:</strong> 2/23 Veerapandi, Tiruppur</p>
      <p><strong>Email:</strong> <a href="mailto:eloraproducts@gmail.com">eloraproducts@gmail.com</a></p>
      <p><strong>Phone:</strong> <a href="tel:9597817239">9597817239</a></p>
    </div>
  </footer>

  <script src="js/app.js"></script>
  <script src="js/checkout.js"></script>
</body>
</html>
